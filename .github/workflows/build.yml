name: Magisk Build

on:
  push:
    branches: [ master ]
    paths:
      - 'app/**'
      - 'native/**'
      - 'stub/**'
      - 'buildSrc/**'
      - 'build.py'
      - 'gradle.properties'
      - ".github/workflows/build.yml"
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-release:
    name: Build (Release)
    runs-on: ubuntu-24.04

    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: '11'

      - name: Set up Python 3
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'
          
      - name: Set up GitHub env
        run: |
          ndk_ver=$(sed -n 's/^magisk.fullNdkVersion=//p' gradle.properties)
          echo ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT >> $GITHUB_ENV
          echo MAGISK_NDK_VERSION=$ndk_ver >> $GITHUB_ENV
        shell: bash

      - name: Set up NDK
        run: python build.py ndk

      - name: Build
        run: python build.py -vr all

      - name: Stop gradle daemon
        run: ./gradlew --stop

      # Only upload artifacts built on Linux
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: magisk_release_${{ github.sha }}
          path: out
          
  build-debug:
    name: Build (Debug)
    runs-on: ubuntu-24.04

    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: '11'

      - name: Set up Python 3
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'
          
      - name: Set up GitHub env
        run: |
          ndk_ver=$(sed -n 's/^magisk.fullNdkVersion=//p' gradle.properties)
          echo ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT >> $GITHUB_ENV
          echo MAGISK_NDK_VERSION=$ndk_ver >> $GITHUB_ENV
        shell: bash

      - name: Set up NDK
        run: python build.py ndk

      - name: Refresh flag
        run: touch gradle.properties
        shell: bash

      - name: Build
        run: python build.py -v all

      - name: Stop gradle daemon
        run: ./gradlew --stop

      # Only upload artifacts built on Linux
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: magisk_debug_${{ github.sha }}
          path: out
